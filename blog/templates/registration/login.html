{% extends 'blog/base.html' %}

{% block head_title %}로그인{% endblock %}

{% block main_area %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">로그인</h2>
        {% if form.errors %}
            <div class="alert alert-danger">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group mb-3">
                <label for="{{ form.username.id_for_label }}">아이디</label>
                <input type="text" name="username" id="{{ form.username.id_for_label }}"
                       class="form-control {% if form.username.errors %}is-invalid{% endif %}"
                       autofocus>
            </div>
            <div class="form-group mb-3">
                <label for="{{ form.password.id_for_label }}">비밀번호</label>
                <input type="password" name="password" id="{{ form.password.id_for_label }}"
                       class="form-control {% if form.password.errors %}is-invalid{% endif %}">
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary btn-block">로그인</button>
        </form>
        <hr>
        <p class="text-center">아직 계정이 없으신가요? <a href="/accounts/signup/">회원가입</a></p>
    </div>
</div>
{% endblock %}
