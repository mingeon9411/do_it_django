<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8"/>
        <title>{{ post.title }} - Blog</title>
        <style>
            /* 좌우로 흔들리기 */
            .shake {
                display: inline-block;
                animation: shake 0.5s infinite alternate;
            }
            @keyframes shake {
                from { transform: translateX(-5px); }
                to   { transform: translateX(5px); }
            }

            /* 색이 바뀌기 */
            .color-change {
                animation: colorChange 2s infinite;
            }
            @keyframes colorChange {
                0%   { color: red; }
                33%  { color: blue; }
                66%  { color: green; }
                100% { color: red; }
            }

            /* 커졌다 작아지기 */
            .pulse {
                display: inline-block;
                animation: pulse 1s infinite alternate;
            }
            @keyframes pulse {
                from { transform: scale(1); }
                to   { transform: scale(1.3); }
            }

            /* 굵은 선 */
            .thick-line {
                border: 10px solid #e74c3c;
                border-radius: 2px;
            }

            /* 스무스 스크롤 */
            html {
                scroll-behavior: smooth;
            }

            /* 스크롤 진행 바 */
            #scroll-progress {
                position: fixed;
                top: 0;
                left: 0;
                height: 4px;
                width: 0%;
                background: linear-gradient(to right, #e74c3c, #f39c12);
                z-index: 9999;
                transition: width 0.1s ease;
            }

            /* 댓글로 이동 버튼 */
            .scroll-btn {
                display: inline-block;
                margin-top: 16px;
                padding: 10px 20px;
                background: #e74c3c;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 1rem;
                text-decoration: none;
            }
            .scroll-btn:hover {
                background: #c0392b;
            }

            /* 맨 위로 버튼 */
            #back-to-top {
                position: fixed;
                bottom: 30px;
                right: 30px;
                padding: 10px 14px;
                background: #333;
                color: white;
                border: none;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.2rem;
                opacity: 0;
                transition: opacity 0.3s;
            }
            #back-to-top.visible {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div id="scroll-progress"></div>

        {% include 'blog/signup.html' %}
        <h1 id="top">{{ post.title }}</h1>
        <h4>{{ post.created_at}}</h4>
        <p>{{post.content}}</p>

        <a href="#comment-section" class="scroll-btn">댓글로 이동 ↓</a>

        <hr class="thick-line"/>
        <h3 id="comment-section">
            <span class="shake">😂</span>
            <span class="color-change">댓글을 여기에 추가해주세요.</span>
            <span class="pulse">😂</span>
        </h3>

        <button id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

        <script>
            const progressBar = document.getElementById('scroll-progress');
            const backToTop = document.getElementById('back-to-top');

            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                progressBar.style.width = progress + '%';

                if (scrollTop > 200) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });
        </script>
    </body>
</html>
