<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f5f6fa;
            color: #333;
        }

        /* 스크롤 진행 바 */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            width: 0%;
            background: linear-gradient(to right, #e74c3c, #f39c12);
            z-index: 9999;
            transition: width 0.1s ease;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 24px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        header a {
            color: #aad4f5;
            text-decoration: none;
            font-size: 0.95rem;
        }

        header a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .post-card {
            background: white;
            border-radius: 10px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .post-card h2 a {
            font-size: 1.3rem;
            color: #2980b9;
            text-decoration: none;
        }

        .post-card h2 a:hover {
            text-decoration: underline;
        }

        .post-meta {
            font-size: 0.85rem;
            color: #999;
            margin: 6px 0 12px;
        }

        .post-preview {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 맨 위로 버튼 */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 10px 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #back-to-top.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="scroll-progress"></div>

    <header>
        <h1>Blog</h1>
        <a href="/about_me/">About Me</a>
    </header>

    <div class="container">
        {% for post in posts %}
        <div class="post-card">
            <h2><a href="/blog/{{ post.pk }}/">[{{ post.pk }}] {{ post.title }}</a></h2>
            <p class="post-meta">{{ post.created_at|date:"Y년 m월 d일 H:i" }}</p>
            <p class="post-preview">{{ post.content }}</p>
        </div>
        {% endfor %}
    </div>

    <button id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

    <script>
        const progressBar = document.getElementById('scroll-progress');
        const backToTop = document.getElementById('back-to-top');

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            progressBar.style.width = progress + '%';

            if (scrollTop > 200) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
