{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>글 작성</title>
    <link rel="stylesheet" href="{% static 'blog/bootstrap/bootstrap.min.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/blog/">Start Bootstrap</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link" href="/blog/">블로그</a></li>
                <li class="nav-item"><a class="nav-link" href="/about_me/">소개</a></li>
                <li class="nav-item"><a class="nav-link" href="/signup/">회원가입</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h2 class="mb-4">새 글 작성</h2>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark mt-3">저장</button>
                    <a href="/blog/" class="btn btn-outline-secondary mt-3">취소</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
