{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>글 작성</title>
    <link rel="stylesheet" href="{% static 'blog/bootstrap/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/dynamic/pretendard-dynamic-subset.min.css">
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #f4f6fb; }
        .form-section {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 32px;
        }
        .form-section h2 {
            font-weight: 800;
            border-left: 4px solid #C60C30;
            padding-left: 12px;
            margin-bottom: 28px;
        }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #333; }
        .form-control:focus { border-color: #003478; box-shadow: 0 0 0 0.2rem rgba(0,52,120,0.15); }
        .helptext { font-size: 0.78rem; color: #999; margin-top: 4px; }
        .tag-preview { margin-top: 8px; min-height: 28px; }
        .tag-badge {
            display: inline-block;
            background: #e8eef7;
            color: #003478;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 2px;
        }
        .btn-save { background: #003478; color: #fff; font-weight: 700; padding: 10px 28px; border: none; border-radius: 6px; }
        .btn-save:hover { background: #C60C30; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">the K-Blog</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                    <li class="nav-item"><a class="nav-link" href="/blog/">블로그</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about_me/">소개</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-section">
                    <h2>{% if is_update %}글 수정{% else %}새 글 작성{% endif %}</h2>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">제목</label>
                            <input type="text" name="title" class="form-control"
                                   value="{{ form.title.value|default:'' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">한 줄 소개 <span class="text-muted fw-normal" style="font-size:0.8rem;">(선택)</span></label>
                            <input type="text" name="hook_text" class="form-control"
                                   placeholder="글을 짧게 소개하는 문장을 입력하세요"
                                   value="{{ form.hook_text.value|default:'' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">본문</label>
                            <textarea name="content" class="form-control" rows="10" required>{{ form.content.value|default:'' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">카테고리</label>
                            {{ form.category }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">태그</label>
                            <input type="text" name="tags_input" id="tagsInput" class="form-control"
                                   placeholder="태그1, 태그2, 태그3"
                                   value="{{ form.tags_input.value|default:'' }}"
                                   oninput="previewTags(this.value)">
                            <div class="helptext">쉼표(,)로 구분하여 입력 — 없는 태그는 자동으로 생성됩니다</div>
                            <div class="tag-preview" id="tagPreview"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">대표 이미지</label>
                            <input type="file" name="head_image" class="form-control" accept="image/*">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">파일 첨부</label>
                            <input type="file" name="file_upload" class="form-control">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-save">저장</button>
                            <a href="/blog/" class="btn btn-outline-secondary px-4">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function previewTags(value) {
            const preview = document.getElementById('tagPreview');
            const tags = value.split(',').map(t => t.trim()).filter(t => t);
            preview.innerHTML = tags.map(t => `<span class="tag-badge">🏷️ ${t}</span>`).join('');
        }
        previewTags(document.getElementById('tagsInput').value);
    </script>
</body>
</html>
