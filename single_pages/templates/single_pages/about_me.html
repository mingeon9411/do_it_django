<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>달타냥</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f5f6fa;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: #aad4f5;
            text-decoration: none;
            font-size: 0.95rem;
        }

        header a:hover { text-decoration: underline; }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .card .subtitle {
            color: #999;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .card p {
            line-height: 1.8;
            color: #555;
            margin-bottom: 16px;
        }

        .divider {
            border: none;
            border-top: 2px solid #f0f0f0;
            margin: 28px 0;
        }

        .back-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-btn:hover { background: #1a252f; }
    </style>
</head>
<body>
    <header>
        <span>About Me</span>
        <a href="/blog/">← Blog 목록으로</a>
    </header>

    <div class="container">
        <div class="card">
            <h1>안녕하세요!</h1>
            <p class="subtitle">달타냥 개발자입니다.</p>

            <p>
                이 블로그는 Django를 기반으로 만든 것입니다. 개인이 실습용으로 사용하므로 무단배포는 금지입니다.
            
            </p>

            <p>
                감사합니다.
            </p>

            <hr class="divider"/>

            <p>
                현재 배운 것들: <strong>URL 라우팅, ORM, 템플릿, 관리자 페이지</strong>
            </p>

            <a href="/blog/" class="back-btn">블로그 보러 가기</a>
        </div>
    </div>
</body>
</html>
