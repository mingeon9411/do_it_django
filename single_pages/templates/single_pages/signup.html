<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>회원가입 — the K-Blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/dynamic/pretendard-dynamic-subset.min.css">
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f6fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main { flex: 1; }

        /* ── 네브바 ── */
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }

        /* ── 히어로 배너 ── */
        .signup-hero {
            background: linear-gradient(135deg, #003478 0%, #C60C30 100%);
            padding: 52px 0 40px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .signup-hero::before {
            content: '가입';
            position: absolute;
            font-size: 12rem;
            font-weight: 900;
            opacity: 0.05;
            top: -30px; left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            pointer-events: none;
        }
        .signup-hero h1 { font-size: 2rem; font-weight: 800; letter-spacing: 2px; }
        .signup-hero p  { font-size: 0.95rem; opacity: 0.85; margin-top: 8px; }

        /* ── 카드 ── */
        .k-card {
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.10);
            overflow: hidden;
        }

        .k-card-header {
            background: #003478;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 2px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .k-card-header::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #C60C30;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .k-card-body {
            background: #fff;
            padding: 28px 28px 24px;
            border-left: 3px solid #003478;
        }

        /* ── 폼 ── */
        .form-label {
            font-size: 0.88rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
        }

        .form-control {
            border-color: #ddd;
            font-size: 0.92rem;
            padding: 10px 14px;
            border-radius: 6px;
        }

        .form-control:focus {
            border-color: #003478;
            box-shadow: 0 0 0 0.2rem rgba(0,52,120,0.15);
        }

        .form-control.is-invalid { border-color: #C60C30; }

        .invalid-feedback { font-size: 0.8rem; color: #C60C30; }

        .helptext {
            font-size: 0.76rem;
            color: #999;
            margin-top: 4px;
            line-height: 1.5;
        }

        /* ── 제출 버튼 ── */
        .btn-signup {
            background: #003478;
            color: #fff;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-signup:hover { background: #C60C30; color: #fff; }

        /* ── 로그인 링크 ── */
        .login-link {
            text-align: center;
            font-size: 0.88rem;
            color: #888;
            margin-top: 18px;
        }
        .login-link a { color: #003478; font-weight: 600; text-decoration: none; }
        .login-link a:hover { color: #C60C30; }

        /* ── 푸터 ── */
        footer { background: #212529; color: #aaa; font-size: 0.85rem; }
    </style>
</head>
<body>

<!-- 네브바 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">the K-Blog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link" href="/blog/">블로그</a></li>
                <li class="nav-item"><a class="nav-link" href="/about_me/">소개</a></li>
                <li class="nav-item"><a class="nav-link active" href="/signup/">회원가입</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 히어로 배너 -->
<div class="signup-hero">
    <h1>회원가입</h1>
    <p>the K-Blog 멤버가 되어보세요</p>
</div>

<main class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="k-card">
                    <div class="k-card-header">계정 만들기</div>
                    <div class="k-card-body">
                        <form method="post">
                            {% csrf_token %}
                            {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                                <input
                                    type="{{ field.field.widget.input_type }}"
                                    name="{{ field.html_name }}"
                                    id="{{ field.id_for_label }}"
                                    class="form-control {% if field.errors %}is-invalid{% endif %}"
                                    {% if field.value %}value="{{ field.value }}"{% endif %}
                                >
                                {% for error in field.errors %}
                                    <div class="invalid-feedback d-block">{{ error }}</div>
                                {% endfor %}
                                {% if field.help_text %}
                                    <div class="helptext">{{ field.help_text }}</div>
                                {% endif %}
                            </div>
                            {% endfor %}
                            <button type="submit" class="btn-signup">가입하기</button>
                        </form>
                        <p class="login-link">이미 계정이 있으신가요? <a href="/accounts/login/">로그인</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 푸터 -->
<footer class="py-4">
    <div class="container text-center">
        <p class="mb-0">Copyright &copy; Do It Django 2024</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
